<style>
#graph-app { position: relative; width: 100%; height: calc(100vh - var(--header-height, 70px)); margin-top: var(--header-height, 0); }
#graph-app canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
#graph-app canvas.dragging { cursor: grabbing; }
#graph-app canvas.pointer { cursor: pointer; }

.graph-ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
.graph-ui > * { pointer-events: auto; }

.graph-legend { position: absolute; bottom: 24px; left: 24px; display: flex; gap: 18px; align-items: center; }
.graph-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
.graph-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.graph-controls { position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 6px; }
.graph-control-btn {
    width: 36px;
    height: 36px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-muted);
    transition: all 0.2s;
    line-height: 1;
}
.graph-control-btn:hover { background: var(--bg-accent); border-color: var(--accent-primary); color: var(--accent-primary); }

.graph-panel {
    position: absolute;
    top: 70px;
    right: 24px;
    bottom: 80px;
    width: 300px;
    max-height: calc(100vh - 180px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transform: translateX(340px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    overflow: hidden;
}
.graph-panel.open { transform: translateX(0); opacity: 1; pointer-events: auto; }

.graph-panel-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    transition: all 0.2s;
}
.graph-panel-close:hover { background: rgba(255, 107, 107, 0.1); border-color: rgba(255, 107, 107, 0.25); color: #ff6b6b; }

.graph-panel-type { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
.graph-panel-title { font-size: 17px; font-weight: 500; line-height: 1.4; color: var(--text-main); margin-top: 4px; }
.graph-panel-url { font-size: 11px; color: var(--text-muted); margin-top: 4px; word-break: break-all; }
.graph-panel-url a { color: var(--accent-link); text-decoration: none; }
.graph-panel-url a:hover { text-decoration: underline; }

.graph-panel-divider { height: 1px; background: linear-gradient(90deg, var(--accent-primary), transparent); flex-shrink: 0; opacity: 0.3; }

.graph-panel-sub { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }

.graph-pills { display: flex; flex-wrap: wrap; gap: 6px; overflow-y: auto; flex: 1; padding-right: 4px; }
.graph-pills::-webkit-scrollbar { width: 3px; }
.graph-pills::-webkit-scrollbar-track { background: transparent; }
.graph-pills::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.graph-pill {
    background: transparent;
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.graph-pill:hover { background: var(--bg-accent); border-color: var(--accent-primary); color: var(--text-main); }

.graph-hint { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }

.graph-stats { position: absolute; top: 16px; right: 24px; z-index: 20; }
.graph-node-count { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--text-muted); }

@media (max-width: 768px) {
    .graph-search { top: 12px; left: 12px; }
    .graph-search input { width: 200px; padding: 8px 14px; font-size: 12px; }
    .graph-stats { top: 12px; right: 12px; }
    .graph-node-count { padding: 4px 10px; font-size: 11px; }
    .graph-legend { bottom: 16px; left: 12px; gap: 12px; }
    .graph-controls { bottom: 16px; right: 12px; }
    .graph-panel { width: calc(100vw - 32px); right: 16px; top: 60px; bottom: 70px; max-height: none; }
}
</style>

<div class="graph-ui">
    <div class="graph-stats">
        <div class="graph-node-count">Nodes: <span id="graph-count">—</span></div>
    </div>

    <div class="graph-legend">
        <div class="graph-legend-item"><span class="graph-legend-dot" style="background: var(--accent-primary)"></span>Hub</div>
        <div class="graph-legend-item"><span class="graph-legend-dot" style="background: var(--accent-link)"></span>Tag</div>
        <div class="graph-legend-item"><span class="graph-legend-dot" style="background: var(--accent-secondary)"></span>Article</div>
    </div>

    <div class="graph-controls">
        <div class="graph-control-btn" id="graph-zi" title="Zoom In">+</div>
        <div class="graph-control-btn" id="graph-zo" title="Zoom Out">−</div>
        <div class="graph-control-btn" id="graph-re" title="Reset View">⌖</div>
    </div>
</div>

<div id="graph-panel" class="graph-panel">
    <div class="graph-panel-close" id="graph-panel-close">✕</div>
    <div class="graph-panel-type" id="graph-p-type">Article</div>
    <div class="graph-panel-title" id="graph-p-title">Node</div>
    <div class="graph-panel-url" id="graph-p-url"></div>
    <div class="graph-panel-divider"></div>
    <div class="graph-panel-sub">Linked nodes</div>
    <div class="graph-pills" id="graph-pills"></div>
    <div class="graph-hint">Double-click to open • Click pills to navigate</div>
</div>

{{/* Graph logic is loaded via static/js/graph.js in layout.html */}}
