{{ define "content" }}
<div class="error-container">
    <span class="error-code">Entrance Forbidden</span>
    
    <h1 class="error-title">The Path Ends Here</h1>
    
    <p class="error-message">
        "Not all those who wander are lost, but this scroll appears to have been misplaced by the archivists."
    </p>
    
    <div class="error-actions">
        <a href="{{ relativize .BaseURL .RelativePrefix "/" }}" class="btn btn-primary">
             Return to Path
        </a>
        <a href="{{ relativize .BaseURL .RelativePrefix "/blogs/tags/index.html" }}" class="btn btn-secondary">
             Consult Index
        </a>
    </div>
    
    <div class="suggestions">
        <h3>Seek Knowledge Elsewhere</h3>
        <ul>
            <li><a href="{{ relativize .BaseURL .RelativePrefix "/graph.html" }}">Knowledge Graph</a></li>
            <li><a href="https://kush-singh-26.github.io/" target="_blank" rel="noopener">The Author</a></li>
        </ul>
    </div>
</div>

<style>
    /* Custom 404 Styles */
    .error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        text-align: center;
        padding: 3rem 1rem;
        max-width: 800px;
        margin: 0 auto;
    }
    
    .error-code {
        font-family: var(--font-serif);
        font-size: 1.5rem;
        font-weight: 400;
        color: var(--accent-tertiary); /* Gold */
        margin-bottom: 2rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
    }
    
    .error-title {
        font-family: var(--font-serif);
        font-size: 3rem;
        margin: 0 0 2rem;
        color: var(--text-main);
        font-weight: 400;
        line-height: 1.2;
    }
    
    .error-message {
        font-family: var(--font-sans);
        font-size: 1.1rem;
        color: var(--text-muted);
        margin-bottom: 3rem;
        max-width: 500px;
        line-height: 1.8;
        font-style: italic;
    }
    
    .error-actions {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .btn {
        padding: 0.6rem 2rem;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        border: 1px solid var(--border);
    }
    
    .btn-primary {
        background: transparent;
        color: var(--text-main);
    }
    
    .btn-primary:hover {
        border-color: var(--accent-tertiary);
        color: var(--accent-tertiary);
        box-shadow: 0 0 20px rgba(180, 168, 150, 0.1);
    }
    
    .btn-secondary {
        background: transparent;
        color: var(--text-muted);
    }
    
    .btn-secondary:hover {
        border-color: var(--accent-primary);
        color: var(--accent-primary);
    }
    
    .suggestions {
        margin-top: 5rem;
        padding: 2rem 0;
        border-top: 1px solid var(--border-subtle);
        width: 100%;
    }
    
    .suggestions h3 {
        font-family: var(--font-serif);
        margin-bottom: 2rem;
        color: var(--text-muted);
        font-size: 0.9rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 400;
    }
    
    .suggestions ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: center;
        gap: 3rem;
        flex-wrap: wrap;
    }
    
    .suggestions a {
        color: var(--text-main);
        text-decoration: none;
        font-family: var(--font-serif);
        font-size: 1.1rem;
        transition: color 0.3s ease;
    }
    
    .suggestions a:hover {
        color: var(--accent-tertiary);
    }
</style>
{{ end }}
